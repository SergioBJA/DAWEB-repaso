name: CI/CD Pipeline - Examen

on:
  push:
    branches: [ main ]

jobs:
  # 1. Control de Calidad (¡El que ya funciona!)
  linting:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint fastapi uvicorn sqlalchemy pydantic

    - name: Run Pylint
      run: |
        PYTHONPATH=. pylint app/main.py app/routers/items.py app/database.py app/models.py --disable=C,R,W,I,E0401,E0402 || true

  # 2. Empaquetado y subida a DockerHub
  build-and-push:
    needs: linting
    runs-on: ubuntu-latest
    steps:
    - name: Descargar codigo
      uses: actions/checkout@v3

    - name: Iniciar sesion en DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.REC_DHUB_USER }}
        password: ${{ secrets.REC_DHUB_TOKEN }}

    - name: Construir y subir imagen Docker
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.REC_DHUB_USER }}/apirec:latest

  # 3. Despliegue automatico en AWS mediante SSH
  deploy-to-aws:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Descargar codigo
      uses: actions/checkout@v3

    - name: Desplegar en EC2 via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.REC_EC2_IP }}
        username: ${{ secrets.REC_EC2_USER }}
        key: ${{ secrets.REC_EC2_KEY }}
        script: |
          mkdir -p ~/examen
          cd ~/examen
          
          cat << 'EOF' > docker-compose.yml
          services:
            apiexamen:
              image: ${{ secrets.REC_DHUB_USER }}/apirec:latest
              ports:
                - 80:8000
              restart: always
          EOF
          
          sudo docker compose pull
          sudo docker compose up -d
