name: Pylint

on:
  pull_request:
    branches:
      - main
    paths:
      - '**.py'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"] # Simplificado a la versión de tu contenedor para ir más rápido

    steps:
    # Paso 1: Descargar el código
    - name: Checkout code
      uses: actions/checkout@v4

    # Paso 2: Configurar Python
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    # Paso 3: Instalar Pylint Y las dependencias de tu aplicación (¡Obligatorio!)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint fastapi uvicorn sqlalchemy pydantic

    # Paso 4: Ejecutar Pylint con los filtros de seguridad
    - name: Analizar el codigo con pylint
      run: |
        PYTHONPATH=. pylint app/main.py app/routers/items.py app/database.py app/models.py --disable=C,R,W0611,W0621